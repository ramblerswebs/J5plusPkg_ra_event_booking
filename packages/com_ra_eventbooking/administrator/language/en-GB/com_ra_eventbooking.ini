COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_TITLE="Event Booking: Email to Bookers by Admin"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_SHORT="Email Bookers"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_DESC="Sent to all bookers for an event"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_SUBJECT="Message about event {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_BODY="Dear {TONAME}\n\n{EMAILCONTENT}\n{SIGNATURE}\n\nDetails of this event\nYou have {ATTENDEES} place(s) booked on this event\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKERS_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<p>{EMAILCONTENT}</p>\n<p>{SIGNATURE}</p>\n<br><hr>\n<h3>Details of this event</h3>\n<p>You have <b>{ATTENDEES}</b> place(s) booked on this event</p>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_TITLE="Event Booking: Email to Booking Contact"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_SHORT="Email Booking Contact"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_DESC="Sent to the booking contact for an event"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_SUBJECT="Event query from {REPLYTONAME}: {EVENTTITLE}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_BODY="This is a query about this event from {REPLYTONAME}\n\nDear {TONAME}\n\n{EMAILCONTENT}\nRegards {REPLYTONAME}\n\nDetails of this event\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_CONTACT_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>This is a query about this event from {REPLYTONAME}</b></p>\n<p><b>Dear {TONAME}</b></p>\n<p>{EMAILCONTENT}</p>\n<p><b>Regards<br>{REPLYTONAME}</b></p>\n<br><hr>\n<h3>Details of this event</h3>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_TITLE="Event Booking: Booking List Email"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_SHORT="Booking List"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_DESC="Sends the booking list to the organiser"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_SUBJECT="Booking List for {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_BODY="Dear {TONAME}\n{REASON}\nBooking List as per email date\n{EVENTDATE} - {EVENTTITLE}\n\n{BOOKINGLIST}\n\n{WAITINGLIST}\n\n{SIGNATURE}\n\nDetails of this event\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_HTMLBODY="<style>table, td, th {border: 1px solid; padding: 5px;}table {border-collapse: collapse;}</style><div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<h2>Dear {TONAME}</h2>\n{REASON}\n<h3>Booking List as per date of email</h3>\n<p><b>{EVENTDATE} - {EVENTTITLE}</b></p>\n<p>{BOOKINGLIST}</p>\n<p>{WAITINGLIST}</p>\n<p>{SIGNATURE}</p>\n<br><hr>\n<h3>Details of this event</h3>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_TITLE="Event Booking: Booking List Email (Event Closed)"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_SHORT="Booking List (Closed)"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_DESC="Sends the booking list when the event is closed"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_SUBJECT="Booking List (Closed) for {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_BODY="Dear {TONAME}\n\nBooking List - Closed\n{EVENTDATE} - {EVENTTITLE}\n\n{BOOKINGLIST}\n\n{WAITINGLIST}\n\n{SIGNATURE}\n\nDetails of this event\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_BOOKING_LIST_CLOSED_HTMLBODY="<style>table, td, th {border: 1px solid; padding: 5px;}table {border-collapse: collapse;}</style><div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<h2>Dear {TONAME}</h2>\n<h3>Booking List - Closed</h3>\n<p><b>{EVENTDATE} - {EVENTTITLE}</b></p>\n<p>{BOOKINGLIST}</p>\n<p>{WAITINGLIST}</p>\n<p>{SIGNATURE}</p>\n<br><hr>\n<h3>Details of this event</h3>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_TITLE="Event Booking: Notification List Email"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_SHORT="Notification List Email"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_DESC="Sent to users on the notification/waiting list by Admin"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_SUBJECT="Message about event {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_BODY="Dear {TONAME}\n{EMAILCONTENT}\n{SIGNATURE}\n\nDetails of this event\nYou DO NOT have any places booked for this event but you are on our notification list should places become available\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EMAIL_WAITING_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<div>{EMAILCONTENT}</div>\n<p>{SIGNATURE}</p>\n<hr>\n<h3>Details of this event</h3>\n<p>You <b>DO NOT</b> have any places booked for this event but you are on our notification list should places become available</p>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_TITLE="Event Booking: Event Details Changed"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_SHORT="Event Changed"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_DESC="Sent to bookers when an event details change"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_SUBJECT="Event Details Changed: {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_BODY="The details of the {EVENTTYPE} on {EVENTDATE} have changed\nDear {TONAME}\nYou have booked {ATTENDEES} place(s) on the following event\nAs the details of the event have changed, you are advised to check the details via our web site.\nYou can view the details of the event at {VIEWBUTTON}\n\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_EVENT_CHANGED_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<h2>The details of the {EVENTTYPE} on {EVENTDATE} have changed</h2>\n<p>Dear {TONAME}</p>\n<p>You have booked <b>{ATTENDEES}</b> place(s) on the following event</p>\n<p style=\\\"color:red\\\"><b>As the details of the event have changed, </b>you are advised to check the details via our web site.</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<h3>Group: {GROUPNAME}</h3>\n<h3>Date: {EVENTDATE}</h3>\n<h3>Title: {EVENTTITLE}</h3>\n<p>Description: {EVENTDESCRIPTION}</p>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_TITLE="Event Booking: New Booking Confirmation"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_SHORT="New Booking"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_DESC="Sent to a user when they make a new booking"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_SUBJECT="Booking Confirmation for {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_BODY="Dear {TONAME}\nThank you. You have booked {ATTENDEES} place(s) on the following {EVENTTYPE}\n\nIf you need to change your booking use one of these links:\n{CANCELBUTTON}     {VIEWBUTTON}\n{PAYMENT}\n{BOOKINGEMAILTEXT}\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_NEW_BOOKING_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<p>Thank you.<br/>You have booked <b>{ATTENDEES}</b> place(s) on the following {EVENTTYPE}</p>\n<p>If you need to change your booking use one of these links:  {CANCELBUTTON}     {VIEWBUTTON}</p>\n{PAYMENT}\n{BOOKINGEMAILTEXT}\n<hr><p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_TITLE="Event Booking: Places Available Notification"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_SHORT="Places Available"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_DESC="Sent to the notify list when places become available"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_SUBJECT="Places Available: {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_BODY="Dear {TONAME}\nThis is to notify you that there are {NOOFPLACES} place(s) available for this event\n{SIGNATURE}\n\nDetails of this event\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_NOTIFY_LIST_EMAIL_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<div>This is to notify you that there are {NOOFPLACES} place(s) available for this event</div>\n<p>{SIGNATURE}</p>\n<hr>\n<h3>Details of this event</h3>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_TITLE="Event Booking: Booking Removed"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_SHORT="Booking Removed"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_DESC="Sent to a user when their booking is removed"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_SUBJECT="Booking Removed: {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_BODY="As requested, we have removed your booking for the following {EVENTTYPE}\nDear {TONAME}\nYour booking for this event has been removed\n\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_REMOVE_BOOKING_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<h2>As requested, we have removed your booking for the following {EVENTTYPE}</h2>\n<p>Dear {TONAME}</p>\n<p>Your booking for this event has been removed</p>\n<hr><h3>Group: {GROUPNAME}</h3>\n<h3>Date: {EVENTDATE}</h3>\n<h3>Title: {EVENTTITLE}</h3>\n<p>Description: {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_TITLE="Event Booking: Verify Email Address"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_SHORT="Verify Email"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_DESC="Sent to a user to verify their email address"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_SUBJECT="Email Verification Code"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_BODY="Dear {TONAME}\nPlease use the following code to verify your email address\n\nCode: {VERIFYCODE}\n\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_VERIFY_EMAIL_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<p>Please use the following code to verify your email address</p>\n<h2>Code: <b>{VERIFYCODE}</b></h2>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_TITLE="Event Booking: Added to Waiting List"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_SHORT="Waiting List Added"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_DESC="Sent to a user when they are added to the waiting list"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_SUBJECT="Added to Waiting List: {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_BODY="Dear {TONAME}\nWe have added you to the waiting list and will notify you when places are available.\nWhen places are available they are booked in a first come, first served basis\n\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_WAITING_ADD_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<p><b>Dear {TONAME}</b></p>\n<p>We have added you to the waiting list and will notify you when places are available.</p>\n<p>When places are available they are booked in a first come, first served basis</p>\n<p><b>Group:</b> {GROUPNAME}</p>\n<p><b>Date:</b> {EVENTDATE}</p>\n<p><b>Title:</b> {EVENTTITLE}</p>\n<p><b>Description:</b> {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_TITLE="Event Booking: Removed from Waiting List"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_SHORT="Waiting List Removed"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_DESC="Sent to a user when they are removed from the waiting list"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_SUBJECT="Removed from Waiting List: {EVENTTITLE} on {EVENTDATE}"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_BODY="We have removed you from the waiting list for this event\nDear {TONAME}\nYou will no longer be notified when places come available for this event\n\nGroup: {GROUPNAME}\nDate: {EVENTDATE}\nTitle: {EVENTTITLE}\nDescription: {EVENTDESCRIPTION}\nYou can view the details of the event at {VIEWBUTTON}\n\n{SIGNATURE}\n\n{FOOTER}"
COM_RA_EVENTBOOKING_MAIL_WAITING_DELETE_HTMLBODY="<div style=\"width:100%;max-width:100%;box-sizing:border-box;\">\n<h2>We have removed you from the waiting list for this event</h2>\n<p>Dear {TONAME}</p>\n<p>You will no longer be notified when places come available for this event</p>\n<h3>Group: {GROUPNAME}</h3>\n<h3>Date: {EVENTDATE}</h3>\n<h3>Title: {EVENTTITLE}</h3>\n<p>Description: {EVENTDESCRIPTION}</p>\n<p>You can view the details of the event at {VIEWBUTTON}</p>\n<p>{SIGNATURE}</p>\n<hr/>\n{FOOTER}\n</div>"
